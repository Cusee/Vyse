// proto/vyse.proto
//
// ─────────────────────────────────────────────────────────────────────────────
// WHAT IS THIS FILE?
//
// This is a Protocol Buffer ("proto") definition file. Think of it as a
// schema or a contract. It defines:
//
//   1. Every message (data structure) passed between the gateway and engine.
//   2. Every RPC (remote function call) the engine exposes.
//
// WHY DOES IT EXIST?
//
// The Go gateway and the Rust engine are two separate programs that talk to
// each other over gRPC. For them to understand each other, both sides must
// agree on the exact shape of every message — field names, types, order.
// This file is that agreement. You write it once, then run a compiler
// (protoc) which auto-generates the Go and Rust glue code from it.
//
// WHAT DOES "GENERATED" MEAN?
//
// Running `make proto-gen` in gateway/ takes this file and produces:
//   gateway/internal/proto/vyse.pb.go        — Go message structs
//   gateway/internal/proto/vyse_grpc.pb.go   — Go gRPC client/server code
//
// Running `cargo build` in engine/ takes this file and produces:
//   engine/src/ (via OUT_DIR)                — Rust message structs + tonic server
//
// You never edit the generated files — you edit this file and regenerate.
//
// FIELD NUMBERS (the = 1, = 2, etc.)
//
// Every field has a number. These numbers are what actually gets sent over
// the wire — not the field name. This means:
//   - You can rename a field freely (just a code change).
//   - You MUST NOT change or reuse a field number once deployed — doing so
//     corrupts messages between old and new versions.
//   - Adding a new field with a new number is always safe.
// ─────────────────────────────────────────────────────────────────────────────

syntax = "proto3";

package vyse.v1;

// go_package tells protoc-gen-go where to put the generated Go file and
// what package name to use. Must match the import path in client.go.
option go_package = "github.com/vyse-security/vyse/gateway/internal/proto;vypb";

// ─────────────────────────────────────────────────────────────────────────────
// VyseEngine — the gRPC service implemented by the Rust engine.
//
// The Go gateway is the only client of this service.
// All 6 methods are implemented in engine/src/grpc/service.rs.
// ─────────────────────────────────────────────────────────────────────────────
service VyseEngine {

  // Infer is the hot path. Every client inference request becomes one Infer
  // call. The engine loads session state, scores the prompt, applies defence
  // if needed, calls the LLM, and returns the (possibly perturbed) response.
  rpc Infer(InferenceRequest) returns (InferenceResponse);

  // GetSession returns the full behavioural profile for a single session.
  // Used by the admin dashboard to inspect a specific session in detail.
  rpc GetSession(GetSessionRequest) returns (SessionState);

  // ListSessions streams every active session back to the caller, optionally
  // filtered by tier. The stream closes when all sessions have been sent.
  // Used by the admin dashboard sessions table.
  rpc ListSessions(ListSessionsRequest) returns (stream SessionState);

  // DeleteSession bans a session and removes its state from Redis.
  // Audit records in PostgreSQL are kept — banning is not erasure.
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);

  // GetStats returns aggregate numbers for the admin dashboard overview:
  // session counts by tier, total requests, noise injections, Rekor entries.
  rpc GetStats(GetStatsRequest) returns (StatsResponse);

  // HealthCheck returns the engine's liveness and readiness.
  // The gateway calls this from its own GET /health endpoint so the
  // dashboard shows one unified health status for the whole system.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Infer — request and response
// ─────────────────────────────────────────────────────────────────────────────

message InferenceRequest {
  // SHA-256 hex hash of the raw session ID. The gateway hashes it before
  // sending — the raw session ID never crosses this boundary.
  string session_id_hash = 1;

  // The user's prompt text. The gateway enforces max byte length before
  // sending, so the engine can trust this is within limits.
  string prompt = 2;

  // SHA-256 hex hash of the client IP. Stored in audit records only.
  // The raw IP is never sent to or stored by the engine.
  string client_ip_hash = 3;

  // UUID generated by the gateway. The engine echoes it back in the response
  // so logs on both sides can be correlated by request_id.
  string request_id = 4;

  // Semver of the gateway that sent this request.
  // Used to detect version skew between gateway and engine deployments.
  string gateway_version = 5;
}

message InferenceResponse {
  // The text to return to the client.
  // Tier 1: clean LLM output.
  // Tier 2/3: perturbed output — the engine decides what to serve.
  string response = 1;

  // Security tier assigned to this session: 1 (clean), 2 (suspicious),
  // 3 (malicious). The gateway passes this to the client for transparency.
  int32 tier = 2;

  // Weighted combination of V/D/E/A scores, in [0.0, 1.0].
  float hybrid_score = 3;

  // How long this session has been actively tracked in minutes.
  // Zero until the session exceeds the tracking_threshold.
  float duration_mins = 4;

  // Echoes request_id from InferenceRequest for log correlation.
  string request_id = 5;

  // Individual signal scores for admin observability.
  // Not returned to clients — only used in admin dashboard and logs.
  ScoreBreakdown score_breakdown = 6;
}

// ScoreBreakdown holds the four individual signal scores for one inference.
// These are stored in PostgreSQL query_logs and shown on the admin dashboard.
message ScoreBreakdown {
  float v_score        = 1; // Velocity:   RPM in sliding window, normalised [0,1]
  float d_score        = 2; // Divergence: cosine similarity to previous embedding [0,1]
  float e_score        = 3; // Entropy:    inverse bigram entropy of session history [0,1]
  float a_score        = 4; // Anomaly:    IsolationForest score [0,1]
  bool  intent_flagged = 5; // true = NLI classifier detected extraction-style intent
  string intent_label  = 6; // matched intent category; empty when intent_flagged=false
}

// ─────────────────────────────────────────────────────────────────────────────
// GetSession
// ─────────────────────────────────────────────────────────────────────────────

message GetSessionRequest {
  string session_id_hash = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// ListSessions
// ─────────────────────────────────────────────────────────────────────────────

message ListSessionsRequest {
  // Filter by tier: 1, 2, or 3. Set to 0 to return all tiers.
  int32 tier_filter = 1;

  // Maximum sessions to stream. Set to 0 for no limit.
  int32 limit = 2;
}

// SessionState is the full behavioural profile for one active session.
// Returned by GetSession and streamed by ListSessions.
message SessionState {
  string session_id_hash      = 1;  // SHA-256 hash of raw session ID
  int32  tier                 = 2;  // current tier: 1, 2, or 3
  int64  first_seen_at        = 3;  // Unix seconds: first request timestamp
  int64  last_active_at       = 4;  // Unix seconds: most recent request
  int64  tracking_started_at  = 5;  // Unix seconds: when scoring began; 0 if not yet flagged
  int64  request_count        = 6;  // total requests in this session
  float  dynamic_mean_rpm     = 7;  // rolling average requests per minute
  float  current_hybrid_score = 8;  // most recent hybrid threat score
  float  duration_mins        = 9;  // tracked session duration in minutes
  bool   is_banned            = 10; // true if manually banned by an admin
}

// ─────────────────────────────────────────────────────────────────────────────
// DeleteSession
// ─────────────────────────────────────────────────────────────────────────────

message DeleteSessionRequest {
  string session_id_hash = 1;
}

message DeleteSessionResponse {
  bool   success = 1;
  string message = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// GetStats
// ─────────────────────────────────────────────────────────────────────────────

message GetStatsRequest {}

message StatsResponse {
  int64 total_sessions        = 1; // all sessions ever seen
  int64 active_sessions       = 2; // sessions with activity in the last hour
  int64 tier1_count           = 3; // current Tier 1 sessions
  int64 tier2_count           = 4; // current Tier 2 sessions
  int64 tier3_count           = 5; // current Tier 3 sessions
  int64 total_requests        = 6; // lifetime inference requests processed
  int64 noise_injected_count  = 7; // total responses perturbed
  int64 rekor_entries_count   = 8; // Tier 3 events logged to Rekor
}

// ─────────────────────────────────────────────────────────────────────────────
// HealthCheck
// ─────────────────────────────────────────────────────────────────────────────

message HealthCheckRequest {}

message HealthCheckResponse {
  string status             = 1; // "healthy" | "degraded" | "unhealthy"
  string version            = 2; // engine semver
  bool   redis_connected    = 3;
  bool   postgres_connected = 4;
  bool   rekor_connected    = 5;
  bool   models_loaded      = 6; // true when all ONNX models are warm
  float  uptime_seconds     = 7;
}
